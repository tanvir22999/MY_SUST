<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cricket Tournament</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background: #f4f4f4;
    }
    header {
      background: #006400;
      color: white;
      padding: 20px;
      text-align: center;
    }
    nav {
      background: #333;
      padding: 10px;
      text-align: center;
    }
    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }
    section {
      padding: 20px;
    }
    .form-box {
      background: white;
      padding: 20px;
      border-radius: 8px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      background: #006400;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #004d00;
    }
    .team-card {
      background: white;
      padding: 15px;
      margin: 10px;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<header>
  <h1>Golaikara Youngstar Club Tournament 2026</h1>
  <p>Register your team and players now!</p>
</header>

<nav>
  <a href="#register">Register</a>
  <a href="#teams">Teams</a>
  <a href="#schedule">Schedule</a>
</nav>

<section id="register">
  <h2>Player Registration</h2>
  <div class="form-box">
    <form id="playerForm">
      <input type="text" id="playerName" placeholder="Player Name" required>
      <select id="role">
        <option value="Batsman">Batsman</option>
        <option value="Bowler">Bowler</option>
        <option value="All-rounder">All-rounder</option>
        <option value="Wicketkeeper">Wicketkeeper</option>
      </select>
      <input type="text" id="teamName" placeholder="Team Name" required>
      <input type="text" id="captainName" placeholder="Captain Name" required>
      <button type="submit">Register Player</button>
    </form>
  </div>
</section>

<section id="teams">
  <h2>Teams & Players</h2>
  <div id="teamList"></div>
</section>

<section id="schedule">
  <h2>Match Schedule</h2>
  <p>📅 March 09, 2026 | 10:00 AM | Common Grounds</p>
</section>

<script>
  const form = document.getElementById('playerForm');
  const teamList = document.getElementById('teamList');

  form.addEventListener('submit', function(e) {
    e.preventDefault();

    const playerName = document.getElementById('playerName').value;
    const role = document.getElementById('role').value;
    const teamName = document.getElementById('teamName').value;
    const captainName = document.getElementById('captainName').value;

    const teamCard = document.createElement('div');
    teamCard.classList.add('team-card');
    teamCard.innerHTML = `
      <h3>${teamName}</h3>
      <p><strong>Captain:</strong> ${captainName}</p>
      <p><strong>Player:</strong> ${playerName} (${role})</p>
    `;

    teamList.appendChild(teamCard);

    form.reset();
  });
</script>

</body>
</html>
