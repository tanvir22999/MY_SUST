<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hussain Furniture</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f9f9f9;
      color: #333;
    }

    .banner {
      background: linear-gradient(135deg, #6a1b9a, #8e24aa);
      color: #fff;
      text-align: center;
      padding: 40px 20px;
    }

    .banner h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .banner h2 {
      font-size: 1.2rem;
      font-weight: normal;
      margin-bottom: 30px;
    }

    .categories {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    .category {
      background: #fff;
      color: #333;
      border-radius: 8px;
      padding: 15px 20px;
      width: 150px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: transform 0.3s;
    }

    .category:hover {
      transform: translateY(-5px);
    }

    .category span {
      font-size: 2rem;
      display: block;
      margin-bottom: 10px;
    }

    .buttons {
      margin-bottom: 20px;
      
    }

    .btn {
      background: #ffca28;
      color: #333;
      border: none;
      padding: 12px 20px;
      margin: 5px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
    }

    .btn:hover {
      background: #ffc107;
    }

    .location {
      font-size: 1rem;
      margin-top: 10px;
    }

    @media (max-width: 600px) {
      .categories {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>

  <div class="banner">
    <h1>Hussain Furniture</h1>
    <h2>Where Comfort Meets Elegance<br>حيث يلتقي الراحة بالأناقة</h2>

    <div class="categories">
      <div class="category"><span>🛋</span>Sofas<br>الأرائك</div>
      <div class="category"><span>🪟</span>Curtains<br>الستائر</div>
      <div class="category"><span>🧶</span>Carpets<br>السجاد</div>
      <div class="category"><span>🪵</span>Flooring<br>الأرضيات</div>
      <div class="category"><span>🛏</span>Bed Paint<br>دهان الأسرة</div>
      <div class="category"><span>🏛</span>Gypsum Décor<br>ديكور الجبس</div>
    </div>

    <div class="buttons">
      <button class="btn" onclick="contactUs()">Contact Us</button>
      <button class="btn" onclick="shopNow()">Shop Now</button>
      <button class="btn" onclick="findStore()">Find Store</button>
    </div>

    <div class="location">
      📍 Al Rida St, Al Rayyan<br>📍 شارع الرضا، الريان
    </div>
  </div>

  <script>
    function contactUs() {
      alert("Redirecting to Contact Page...");
      // window.location.href = "contact.html";
    }

    function shopNow() {
      alert("Opening Shop...");
      // window.location.href = "shop.html";
    }

    function findStore() {
      alert("Showing Store Location...");
      // Example: open Google Maps
      window.open("https://www.google.com/maps/search/Al+Rida+St,+Al+Rayyan", "_blank");
    }
  </script>

</body>
</html>
